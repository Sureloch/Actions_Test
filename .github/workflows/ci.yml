name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Ant
        run: sudo apt-get install -y ant

      - name: Compile
        run: javac -cp lib/junit-4.13.2.jar:lib/hamcrest-core-1.3.jar src/*.java -d build

      - name: Run tests
        run: java -cp build:lib/junit-4.13.2.jar:lib/hamcrest-core-1.3.jar org.junit.runner.JUnitCore HelloWorldTest

      - name: Show test results
        run: find . -name "*.txt" -path "*/test*" | xargs cat || echo "No report files found"